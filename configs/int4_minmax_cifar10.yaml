dataset:
  name: CIFAR-10
  data_dir: data
  calibration_size: 1024
  num_workers: 2

model:
  name: resnet18_cifar
  num_classes: 10

experiment:
  seed: 42
  deterministic: true
  device: auto
  batch_size: 128

quantization:
  method: INT4-MinMax
  weight:
    dtype: int4
    qmin: -7
    qmax: 7
    granularity: per_channel
    symmetry: symmetric
    channel_axis: 0
  activation:
    dtype: uint4
    qmin: 0
    qmax: 15
    granularity: per_tensor_per_relu_module
    symmetry: affine
    site: post_relu
    clip_min: 0
    clip_max_source: calibration_max

paths:
  checkpoint_path: checkpoints/fp32_best.pt
  result_path: outputs/results/int4_minmax_result.csv
  log_path: outputs/logs/int4_minmax_ptq.log

smoke:
  max_calibration_batches:
  max_test_batches:
